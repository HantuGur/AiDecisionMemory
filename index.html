<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Decision Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{min-height:100vh;}
body{background:#f7f5f0;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CATEGORIES = ["Karier", "Keuangan", "Relasi", "Bisnis", "Kesehatan", "Lainnya"];
const EMOTIONS = [
  { value: 1, label: "Sangat Tertekan" },
  { value: 2, label: "Tertekan" },
  { value: 3, label: "Netral" },
  { value: 4, label: "Tenang" },
  { value: 5, label: "Sangat Tenang" },
];
const SCORES = [
  { value: 1, label: "Jauh lebih buruk dari ekspektasi" },
  { value: 2, label: "Sedikit lebih buruk" },
  { value: 3, label: "Sesuai ekspektasi" },
  { value: 4, label: "Lebih baik dari dugaan" },
  { value: 5, label: "Jauh melampaui ekspektasi" },
];
const CAT_META = {
  Karier:    { dot: "#7b9e8a", bg: "#f0f5f2", text: "#3a5c4a" },
  Keuangan:  { dot: "#9e8a5a", bg: "#f5f2ec", text: "#5c4a2a" },
  Relasi:    { dot: "#9e7a8a", bg: "#f5f0f2", text: "#5c3a4a" },
  Bisnis:    { dot: "#7a8a9e", bg: "#f0f2f5", text: "#3a4a5c" },
  Kesehatan: { dot: "#7a9e9e", bg: "#f0f5f5", text: "#2a5050" },
  Lainnya:   { dot: "#9a9a8a", bg: "#f3f3f0", text: "#4a4a3a" },
};

const S = {
  r: { background: "#f7f5f0", color: "#2c2a24", minHeight: "100vh", fontFamily: "'DM Sans', sans-serif", fontSize: "15px", lineHeight: "1.65" },
  hd: { padding: ".9rem 1.5rem", borderBottom: "1px solid #e8e4db", display: "flex", alignItems: "center", gap: ".75rem", background: "#faf9f6", position: "sticky", top: 0, zIndex: 10 },
  logo: { fontFamily: "'Lora', Georgia, serif", fontSize: "16px", color: "#3a5c4a", letterSpacing: "-.1px", display: "flex", alignItems: "center", gap: "7px" },
  logodot: { width: "7px", height: "7px", borderRadius: "50%", background: "#7b9e8a", flexShrink: 0 },
  pg: { padding: "1.75rem 1.5rem", maxWidth: "640px", margin: "0 auto", paddingBottom: "5rem" },
  ttl: { fontFamily: "'Lora', Georgia, serif", fontSize: "22px", fontWeight: 400, color: "#1e1c18", marginBottom: ".2rem", letterSpacing: "-.3px" },
  sub: { fontSize: "13px", color: "#9a9488", marginBottom: "1.75rem", fontWeight: 300 },
  bp: { background: "#3a5c4a", border: "none", color: "#f0f5f2", padding: "10px 22px", borderRadius: "22px", fontSize: "14px", fontWeight: 500, cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
  bg: { background: "transparent", border: "1px solid #d8d2c8", color: "#6a6458", padding: "9px 18px", borderRadius: "22px", fontSize: "14px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif" },
  inp: { width: "100%", background: "#fdfcfa", border: "1px solid #dedad2", borderRadius: "10px", color: "#1e1c18", fontSize: "15px", padding: "10px 13px", fontFamily: "'DM Sans', sans-serif", fontWeight: 300, resize: "vertical", lineHeight: "1.6", outline: "none" },
  lb: { display: "block", fontSize: "12px", color: "#9a9488", marginBottom: "7px", letterSpacing: ".2px", fontWeight: 400 },
  fg: { marginBottom: "1.25rem" },
  dv: { border: "none", borderTop: "1px solid #e8e4db", margin: "1.5rem 0" },
  sect: { fontSize: "11px", color: "#b0aa9e", textTransform: "uppercase", letterSpacing: ".5px", marginBottom: ".75rem", fontWeight: 400 },
  card: { background: "#faf9f6", border: "1px solid #e8e4db", borderRadius: "14px", padding: "1rem 1.1rem", marginBottom: ".5rem", cursor: "pointer" },
  sc: { background: "#faf9f6", border: "1px solid #e8e4db", borderRadius: "12px", padding: ".9rem", textAlign: "center" },
  sn: { fontSize: "24px", fontFamily: "'Lora', Georgia, serif", fontWeight: 400, color: "#3a5c4a", lineHeight: 1, marginBottom: "3px" },
  sl: { fontSize: "11px", color: "#b0aa9e", textTransform: "uppercase", letterSpacing: ".5px", fontWeight: 400 },
  gc: { background: "#faf9f6", border: "1px solid #e8e4db", borderRadius: "10px", padding: "10px 12px" },
  gk: { fontSize: "11px", color: "#b0aa9e", textTransform: "uppercase", letterSpacing: ".4px", marginBottom: "4px", fontWeight: 400 },
  gv: { fontSize: "14px", color: "#4a4840", fontWeight: 300 },
  inf: { background: "#f5f3ee", border: "1px solid #e8e4db", borderRadius: "10px", padding: "12px 14px" },
  pb: { background: "#fdfcfa", border: "1px solid #e8e4db", borderRadius: "12px", padding: "1.2rem 1.3rem", fontSize: "14px", lineHeight: "1.85", color: "#4a4840", whiteSpace: "pre-wrap", fontWeight: 300 },
  fab: { position: "fixed", bottom: "1.5rem", right: "1.5rem", background: "#3a5c4a", border: "none", color: "#f0f5f2", width: "52px", height: "52px", borderRadius: "50%", fontSize: "24px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 },
  cb: { background: "#fdfcfa", border: "1px solid #e2ede8", borderRadius: "12px", padding: ".9rem 1.1rem", marginBottom: ".5rem", display: "flex", alignItems: "center", gap: "12px", cursor: "pointer" },
  cdn: { width: "8px", height: "8px", borderRadius: "50%", background: "#7b9e8a", flexShrink: 0 },
};

function fmt(iso) {
  return new Date(iso).toLocaleDateString("id-ID", { day: "numeric", month: "short", year: "numeric" });
}
function daysAgo(iso) {
  return Math.floor((Date.now() - new Date(iso)) / 86400000);
}
function needsCheckin(d) {
  return !d.outcome && daysAgo(d.createdAt) >= 30;
}
function emotionLabel(v) {
  return EMOTIONS.find(e => e.value === v)?.label || "—";
}

// localStorage helpers
const storage = {
  getAll() {
    const arr = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith("dec:")) {
        try { arr.push(JSON.parse(localStorage.getItem(key))); } catch {}
      }
    }
    return arr.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  },
  set(id, val) { localStorage.setItem(id, JSON.stringify(val)); },
};

function Tag({ category }) {
  const cm = CAT_META[category] || CAT_META.Lainnya;
  return (
    <span style={{ fontSize: "11px", padding: "3px 9px", borderRadius: "20px", background: cm.bg, color: cm.text, display: "inline-flex", alignItems: "center", gap: "4px" }}>
      <span style={{ width: 5, height: 5, borderRadius: "50%", background: cm.dot, flexShrink: 0, display: "inline-block" }} />
      {category}
    </span>
  );
}

function Pill({ type, children }) {
  const styles = {
    pend: { fontSize: "11px", color: "#7b9e8a", background: "#edf3ef", padding: "2px 8px", borderRadius: "20px" },
    good: { fontSize: "11px", color: "#3a7055", background: "#e0f0e8", padding: "2px 8px", borderRadius: "20px" },
    bad:  { fontSize: "11px", color: "#7a3535", background: "#f0e0e0", padding: "2px 8px", borderRadius: "20px" },
    wait: { fontSize: "11px", color: "#c0b8aa", background: "#f0ede6", padding: "2px 8px", borderRadius: "20px" },
  };
  return <span style={styles[type]}>{children}</span>;
}

function NavBtn({ label, active, onClick }) {
  return (
    <button onClick={onClick} style={{
      background: active ? "#e2ede8" : "transparent",
      border: "none", color: active ? "#3a5c4a" : "#9a9488",
      cursor: "pointer", fontSize: "13px", padding: "5px 12px",
      borderRadius: "20px", fontFamily: "'DM Sans', sans-serif",
      fontWeight: active ? 500 : 400,
    }}>{label}</button>
  );
}

function ToggleBtn({ selected, onClick, children, selStyle }) {
  const base = { background: "#faf9f6", border: "1px solid #e8e4db", borderRadius: "9px", color: "#9a9488", padding: "9px 6px", textAlign: "center", cursor: "pointer", fontSize: "13px", fontFamily: "'DM Sans', sans-serif", fontWeight: 400, width: "100%" };
  const on = selStyle || { borderColor: "#7b9e8a", color: "#3a5c4a", background: "#edf3ef" };
  return <button style={selected ? { ...base, ...on } : base} onClick={onClick}>{children}</button>;
}

function DecisionCard({ d, onClick }) {
  const days = daysAgo(d.createdAt);
  const pending = needsCheckin(d);
  return (
    <div style={S.card} onClick={onClick}>
      <div style={{ fontSize: "15px", color: "#1e1c18", marginBottom: ".5rem", lineHeight: 1.5 }}>{d.decision}</div>
      <div style={{ display: "flex", gap: "6px", alignItems: "center", flexWrap: "wrap" }}>
        <Tag category={d.category} />
        <span style={{ fontSize: "12px", color: "#b0aa9e" }}>{fmt(d.createdAt)}</span>
        {d.outcome ? (
          d.outcome.score >= 3 ? <Pill type="good">✓ positif</Pill> : <Pill type="bad">✗ negatif</Pill>
        ) : pending ? <Pill type="pend">● check-in</Pill> : <Pill type="wait">{days}h lalu</Pill>}
      </div>
    </div>
  );
}

function Dashboard({ decisions, go, pick }) {
  const evaled = decisions.filter(d => d.outcome);
  const good = evaled.filter(d => d.outcome.score >= 3);
  const acc = evaled.length > 0 ? Math.round((good.length / evaled.length) * 100) : null;
  const pending = decisions.filter(needsCheckin);
  return (
    <div>
      <div style={{ marginBottom: "1.75rem" }}>
        <div style={S.ttl}>Keputusanmu, <em style={{ fontStyle: "italic", color: "#7b9e8a" }}>tercatat.</em></div>
        <div style={S.sub}>Tempat yang tenang untuk menyimpan dan belajar dari setiap pilihan penting.</div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,minmax(0,1fr))", gap: "8px", marginBottom: "1.75rem" }}>
        <div style={S.sc}><div style={S.sn}>{decisions.length}</div><div style={S.sl}>Keputusan</div></div>
        <div style={S.sc}><div style={S.sn}>{evaled.length}</div><div style={S.sl}>Dievaluasi</div></div>
        <div style={S.sc}><div style={S.sn}>{acc !== null ? `${acc}%` : "—"}</div><div style={S.sl}>Akurasi</div></div>
      </div>
      {pending.length > 0 && <>
        <div style={S.sect}>Menunggu refleksimu ({pending.length})</div>
        {pending.map(d => (
          <div key={d.id} style={S.cb} onClick={() => { pick(d); go("checkin"); }}>
            <div style={S.cdn} />
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: "14px", color: "#2c2a24", marginBottom: "2px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.decision}</div>
              <div style={{ fontSize: "12px", color: "#b0aa9e" }}>{daysAgo(d.createdAt)} hari yang lalu</div>
            </div>
            <div style={{ fontSize: "18px", color: "#c8c2b5" }}>›</div>
          </div>
        ))}
        <hr style={S.dv} />
      </>}
      {decisions.length > 0 ? <>
        <div style={S.sect}>Terbaru</div>
        {decisions.slice(0, 5).map(d => <DecisionCard key={d.id} d={d} onClick={() => { pick(d); go("detail"); }} />)}
        {decisions.length > 5 && <button style={{ ...S.bg, width: "100%", marginTop: ".35rem" }} onClick={() => go("history")}>Lihat semua {decisions.length} keputusan</button>}
        <div style={{ marginTop: "1.5rem" }}>
          <button style={{ ...S.bg, width: "100%", fontSize: "13px", borderStyle: "dashed" }} onClick={() => go("pattern")}>◈ Lihat pola keputusanmu</button>
        </div>
      </> : (
        <div style={{ textAlign: "center", padding: "3.5rem 1.5rem" }}>
          <div style={{ fontSize: "32px", marginBottom: ".75rem", opacity: .3 }}>◎</div>
          <div style={{ fontFamily: "'Lora',serif", fontSize: "17px", color: "#6a6458", marginBottom: "8px" }}>Mulai dengan satu keputusan</div>
          <div style={{ fontSize: "14px", marginBottom: "1.75rem", color: "#b0aa9e", fontWeight: 300, lineHeight: 1.7 }}>Tidak perlu keputusan besar. Cukup satu hal<br />yang ingin kamu ingat dan pelajari.</div>
          <button style={S.bp} onClick={() => go("new")}>Catat keputusan pertama</button>
        </div>
      )}
    </div>
  );
}

function NewDecision({ onSave, onBack }) {
  const [form, setForm] = useState({ decision: "", category: "", emotion: null, reasons: "", expectation: "" });
  const [saving, setSaving] = useState(false);
  const valid = form.decision.trim() && form.category && form.emotion && form.reasons.trim();
  async function handleSave() {
    if (!valid) return;
    setSaving(true);
    await onSave(form);
    setSaving(false);
    onBack();
  }
  const inputFocus = e => { e.target.style.borderColor = "#7b9e8a"; };
  const inputBlur  = e => { e.target.style.borderColor = "#dedad2"; };
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "1.75rem" }}>
        <button style={{ ...S.bg, padding: "7px 14px" }} onClick={onBack}>←</button>
        <div>
          <div style={{ ...S.ttl, marginBottom: 0, fontSize: "19px" }}>Keputusan baru</div>
          <div style={{ fontSize: "12px", color: "#b0aa9e", fontWeight: 300 }}>Catat selagi konteksnya masih segar</div>
        </div>
      </div>
      <div style={S.fg}>
        <label style={S.lb}>Apa keputusannya? *</label>
        <textarea style={S.inp} rows={3} placeholder="Tulis keputusannya dengan jelas — bayangkan menjelaskan ke diri sendiri setahun lagi."
          value={form.decision} onChange={e => setForm(p => ({ ...p, decision: e.target.value }))} onFocus={inputFocus} onBlur={inputBlur} />
      </div>
      <div style={S.fg}>
        <label style={S.lb}>Kategori *</label>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "6px" }}>
          {CATEGORIES.map(c => {
            const cm = CAT_META[c];
            return <ToggleBtn key={c} selected={form.category === c}
              selStyle={{ borderColor: cm.dot, color: cm.text, background: cm.bg }}
              onClick={() => setForm(p => ({ ...p, category: c }))}>{c}</ToggleBtn>;
          })}
        </div>
      </div>
      <div style={S.fg}>
        <label style={S.lb}>Kondisi emosional saat ini *</label>
        <div style={{ display: "flex", gap: "5px", flexWrap: "wrap" }}>
          {EMOTIONS.map(e => (
            <button key={e.value} onClick={() => setForm(p => ({ ...p, emotion: e.value }))}
              style={{ flex: "1", minWidth: "80px", background: form.emotion === e.value ? "#edf3ef" : "#faf9f6", border: `1px solid ${form.emotion === e.value ? "#7b9e8a" : "#e8e4db"}`, borderRadius: "9px", color: form.emotion === e.value ? "#3a5c4a" : "#9a9488", padding: "8px 6px", textAlign: "center", cursor: "pointer", fontSize: "12px", fontFamily: "'DM Sans',sans-serif", lineHeight: 1.35 }}>
              {e.label}
            </button>
          ))}
        </div>
      </div>
      <div style={S.fg}>
        <label style={S.lb}>Alasan utama *</label>
        <textarea style={S.inp} rows={3} placeholder="2–3 alasan terkuat. Jujur ke diri sendiri — ini hanya untuk kamu."
          value={form.reasons} onChange={e => setForm(p => ({ ...p, reasons: e.target.value }))} onFocus={inputFocus} onBlur={inputBlur} />
      </div>
      <div style={S.fg}>
        <label style={S.lb}>Ekspektasi hasil <span style={{ color: "#c8c2b5" }}>(opsional)</span></label>
        <textarea style={S.inp} rows={2} placeholder="Apa yang kamu harapkan terjadi dalam 30–90 hari ke depan?"
          value={form.expectation} onChange={e => setForm(p => ({ ...p, expectation: e.target.value }))} onFocus={inputFocus} onBlur={inputBlur} />
      </div>
      <div style={{ display: "flex", gap: "10px", marginTop: "1.5rem" }}>
        <button style={S.bg} onClick={onBack}>Batal</button>
        <button style={{ ...S.bp, flex: 1, opacity: (!valid || saving) ? .5 : 1, cursor: (!valid || saving) ? "not-allowed" : "pointer" }}
          disabled={!valid || saving} onClick={handleSave}>{saving ? "Menyimpan…" : "Simpan ke memory"}</button>
      </div>
    </div>
  );
}

function History({ decisions, go, pick }) {
  const [filter, setFilter] = useState("semua");
  const filters = ["semua", "pending", "evaluated", ...CATEGORIES];
  const filtered = decisions.filter(d => {
    if (filter === "semua") return true;
    if (filter === "pending") return needsCheckin(d);
    if (filter === "evaluated") return !!d.outcome;
    return d.category === filter;
  });
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "1.5rem" }}>
        <button style={{ ...S.bg, padding: "7px 14px" }} onClick={() => go("dashboard")}>←</button>
        <div style={{ ...S.ttl, marginBottom: 0, fontSize: "19px" }}>Semua keputusan</div>
      </div>
      <div style={{ display: "flex", gap: "5px", flexWrap: "wrap", marginBottom: "1.2rem" }}>
        {filters.map(f => (
          <button key={f} onClick={() => setFilter(f)}
            style={{ background: f === filter ? "#edf3ef" : "transparent", border: `1px solid ${f === filter ? "#7b9e8a" : "#e8e4db"}`, color: f === filter ? "#3a5c4a" : "#b0aa9e", padding: "4px 10px", borderRadius: "20px", fontSize: "12px", cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>
            {f.charAt(0).toUpperCase() + f.slice(1)}
          </button>
        ))}
      </div>
      {filtered.length === 0
        ? <div style={{ textAlign: "center", padding: "2rem 0", color: "#b0aa9e", fontSize: "14px" }}>Tidak ada keputusan dengan filter ini.</div>
        : filtered.map(d => <DecisionCard key={d.id} d={d} onClick={() => { pick(d); go("detail"); }} />)
      }
    </div>
  );
}

function Detail({ d, go, onCheckin }) {
  const pending = needsCheckin(d);
  const days = daysAgo(d.createdAt);
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "1.5rem" }}>
        <button style={{ ...S.bg, padding: "7px 14px" }} onClick={() => go("dashboard")}>←</button>
        <Tag category={d.category} />
      </div>
      <div style={{ fontFamily: "'Lora',Georgia,serif", fontSize: "20px", lineHeight: 1.5, color: "#1e1c18", marginBottom: "1.25rem" }}>{d.decision}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "7px", marginBottom: "1.1rem" }}>
        <div style={S.gc}><div style={S.gk}>Tanggal</div><div style={S.gv}>{fmt(d.createdAt)}</div></div>
        <div style={S.gc}><div style={S.gk}>Kondisi emosi</div>
          <div style={{ ...S.gv, color: d.emotion <= 2 ? "#9a5555" : d.emotion >= 4 ? "#3a7055" : "#6a6458" }}>{emotionLabel(d.emotion)}</div>
        </div>
      </div>
      <div style={{ marginBottom: "1rem" }}>
        <div style={{ ...S.gk, marginBottom: "7px" }}>Alasan utama</div>
        <div style={{ ...S.inf, fontSize: "14px", color: "#5a5448", lineHeight: 1.75, fontWeight: 300 }}>{d.reasons}</div>
      </div>
      {d.expectation && <div style={{ marginBottom: "1rem" }}>
        <div style={{ ...S.gk, marginBottom: "7px" }}>Ekspektasi</div>
        <div style={{ ...S.inf, fontSize: "14px", color: "#5a5448", lineHeight: 1.75, fontStyle: "italic", fontWeight: 300 }}>"{d.expectation}"</div>
      </div>}
      <hr style={S.dv} />
      {d.outcome ? (
        <div style={{ background: d.outcome.score >= 3 ? "#edf5f0" : "#f5eeee", border: `1px solid ${d.outcome.score >= 3 ? "#b8d9c4" : "#d9b8b8"}`, borderRadius: "12px", padding: "1rem 1.1rem" }}>
          <div style={{ fontSize: "11px", color: d.outcome.score >= 3 ? "#3a7055" : "#7a3535", textTransform: "uppercase", letterSpacing: ".4px", marginBottom: "7px", fontWeight: 500 }}>
            {d.outcome.score >= 3 ? "✓ Outcome positif" : "✗ Outcome tidak sesuai"}
          </div>
          <div style={{ fontSize: "14px", color: "#4a4840", lineHeight: 1.75, fontWeight: 300 }}>{d.outcome.reflection}</div>
          <div style={{ fontSize: "12px", color: "#b0aa9e", marginTop: "8px" }}>Dievaluasi {fmt(d.outcome.evaluatedAt)}</div>
        </div>
      ) : pending ? (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: "14px", color: "#9a9488", marginBottom: "1rem", fontWeight: 300, lineHeight: 1.6 }}>
            Sudah {days} hari sejak keputusan ini.<br />Saatnya merefleksikan hasilnya.
          </div>
          <button style={S.bp} onClick={onCheckin}>Mulai refleksi</button>
        </div>
      ) : (
        <div style={{ textAlign: "center", padding: ".9rem", color: "#b0aa9e", fontSize: "13px", border: "1px dashed #e8e4db", borderRadius: "10px", fontWeight: 300 }}>
          Check-in tersedia setelah 30 hari · {Math.max(0, 30 - days)} hari lagi
        </div>
      )}
    </div>
  );
}

function Checkin({ d, onSave, onBack }) {
  const [form, setForm] = useState({ score: null, reflection: "" });
  const [saving, setSaving] = useState(false);
  async function handleSave() {
    if (!form.score || !form.reflection.trim()) return;
    setSaving(true);
    await onSave(d.id, { outcome: { ...form, evaluatedAt: new Date().toISOString() } });
    setSaving(false);
    onBack();
  }
  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "1.5rem" }}>
        <button style={{ ...S.bg, padding: "7px 14px" }} onClick={onBack}>←</button>
        <div>
          <div style={{ ...S.ttl, marginBottom: 0, fontSize: "19px" }}>Refleksi keputusan</div>
          <div style={{ fontSize: "12px", color: "#b0aa9e", fontWeight: 300 }}>{daysAgo(d.createdAt)} hari yang lalu</div>
        </div>
      </div>
      <div style={{ ...S.inf, fontFamily: "'Lora',serif", fontSize: "15px", color: "#6a6458", marginBottom: "1.5rem", lineHeight: 1.65, fontStyle: "italic" }}>
        "{d.decision}"
      </div>
      <div style={S.fg}>
        <label style={S.lb}>Bagaimana hasilnya dibanding ekspektasimu?</label>
        <div style={{ display: "flex", flexDirection: "column", gap: "5px" }}>
          {SCORES.map(sc => (
            <button key={sc.value} onClick={() => setForm(p => ({ ...p, score: sc.value }))}
              style={{ background: form.score === sc.value ? "#edf3ef" : "#faf9f6", border: `1px solid ${form.score === sc.value ? "#7b9e8a" : "#e8e4db"}`, borderRadius: "10px", color: form.score === sc.value ? "#3a5c4a" : "#9a9488", padding: "10px 14px", textAlign: "left", cursor: "pointer", fontSize: "14px", fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: "10px" }}>
              <span style={{ fontSize: "12px", minWidth: "16px", fontWeight: 500 }}>{sc.value}</span>
              {sc.label}
            </button>
          ))}
        </div>
      </div>
      <div style={{ ...S.fg, marginTop: "1.2rem" }}>
        <label style={S.lb}>Apa yang sebenarnya terjadi?</label>
        <textarea style={S.inp} rows={4}
          placeholder="Ceritakan hasilnya. Apakah alasanmu dulu tepat? Apa yang tidak kamu antisipasi?"
          value={form.reflection} onChange={e => setForm(p => ({ ...p, reflection: e.target.value }))} />
      </div>
      <button style={{ ...S.bp, width: "100%", opacity: (!form.score || !form.reflection.trim() || saving) ? .5 : 1, cursor: (!form.score || !form.reflection.trim() || saving) ? "not-allowed" : "pointer" }}
        disabled={!form.score || !form.reflection.trim() || saving} onClick={handleSave}>
        {saving ? "Menyimpan…" : "Simpan refleksi"}
      </button>
    </div>
  );
}

function PatternReport({ decisions, onBack }) {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState(null);

  async function generate() {
    setLoading(true); setErr(null); setReport(null);
    const summary = decisions.map((d, i) =>
      `Keputusan ${i + 1}: ${d.decision}\nKategori: ${d.category} | Emosi: ${emotionLabel(d.emotion)} | ${fmt(d.createdAt)}\nAlasan: ${d.reasons}\nEkspektasi: ${d.expectation || "tidak dicatat"}\n${d.outcome ? `Outcome (skor ${d.outcome.score}/5): ${d.outcome.reflection}` : "Belum dievaluasi"}`
    ).join("\n\n---\n\n");
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: `Kamu adalah teman refleksi yang bijak, hangat, dan jujur. Analisis histori keputusan berikut dan buat laporan pola personal.\n\n${summary}\n\nBuat laporan dalam Bahasa Indonesia dengan nada tenang dan suportif tapi jujur.\n\nFormat:\n\n**POLA YANG MUNCUL:**\n[2-3 pola konkret dari data ini]\n\n**KONDISI YANG PERLU DIWASPADAI:**\n[Kondisi di mana keputusanmu cenderung meleset]\n\n**APA YANG BERJALAN BAIK:**\n[Area di mana keputusanmu konsisten tepat]\n\n**PERTANYAAN UNTUK DIRENUNGKAN:**\n[2 pertanyaan refleksi dari pola nyata di atas]\n\nJangan generik. Berpijak hanya pada data yang ada.` }]
        })
      });
      const data = await res.json();
      setReport(data.content?.find(b => b.type === "text")?.text || "Analisis tidak tersedia.");
    } catch { setErr("Gagal menghubungi AI. Coba lagi."); }
    setLoading(false);
  }

  useEffect(() => { if (decisions.length >= 3) generate(); }, []);
  const evaled = decisions.filter(d => d.outcome);
  const good = evaled.filter(d => d.outcome.score >= 3);
  const acc = evaled.length > 0 ? Math.round((good.length / evaled.length) * 100) : null;

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "1.5rem" }}>
        <button style={{ ...S.bg, padding: "7px 14px" }} onClick={onBack}>←</button>
        <div>
          <div style={{ ...S.ttl, marginBottom: 0, fontSize: "19px" }}>Pola keputusanmu</div>
          <div style={{ fontSize: "12px", color: "#b0aa9e", fontWeight: 300 }}>Analisis personal berbasis histori nyata</div>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(2,minmax(0,1fr))", gap: "8px", marginBottom: "1.5rem" }}>
        <div style={S.sc}><div style={S.sn}>{decisions.length}</div><div style={S.sl}>Total</div></div>
        <div style={S.sc}><div style={S.sn}>{acc !== null ? `${acc}%` : "—"}</div><div style={S.sl}>Akurasi</div></div>
        <div style={S.sc}><div style={S.sn}>{decisions.filter(d => d.emotion <= 2).length}</div><div style={S.sl}>Saat tertekan</div></div>
        <div style={S.sc}><div style={S.sn}>{evaled.length}</div><div style={S.sl}>Dievaluasi</div></div>
      </div>
      {decisions.length < 3 ? (
        <div style={{ textAlign: "center", padding: "2rem 0" }}>
          <div style={{ fontSize: "28px", marginBottom: ".75rem", opacity: .3 }}>◌</div>
          <div style={{ fontFamily: "'Lora',serif", fontSize: "16px", color: "#6a6458", marginBottom: "8px" }}>Butuh sedikit lebih banyak data</div>
          <div style={{ fontSize: "13px", fontWeight: 300, color: "#b0aa9e" }}>Tambahkan minimal 3 keputusan untuk analisis pola.</div>
        </div>
      ) : loading ? (
        <div style={{ textAlign: "center", padding: "2.5rem 1.5rem" }}>
          <div style={{ fontFamily: "'Lora',serif", fontSize: "16px", color: "#6a6458", marginBottom: "12px", fontStyle: "italic" }}>Membaca pola keputusanmu…</div>
          <div style={{ fontSize: "13px", color: "#b0aa9e", marginBottom: "12px", fontWeight: 300 }}>Ini butuh sebentar</div>
          <div style={{ height: "2px", background: "#e8e4db", borderRadius: "2px", overflow: "hidden" }}>
            <div style={{ height: "100%", background: "#7b9e8a", borderRadius: "2px", width: "60%", animation: "pulse 1.5s ease-in-out infinite" }} />
          </div>
        </div>
      ) : err ? (
        <div><div style={{ color: "#9a5555", fontSize: "14px", marginBottom: "1rem" }}>{err}</div>
          <button style={S.bg} onClick={generate}>Coba lagi</button></div>
      ) : report ? (
        <div>
          <div style={S.pb}>
            {report.split("**").map((part, i) =>
              i % 2 === 1 ? <strong key={i} style={{ color: "#3a5c4a", fontWeight: 500 }}>{part}</strong> : <span key={i}>{part}</span>
            )}
          </div>
          <button style={{ ...S.bg, width: "100%", marginTop: "1rem", fontSize: "13px" }} onClick={generate}>↻ Generate ulang</button>
        </div>
      ) : null}
    </div>
  );
}

function App() {
  const [view, setView] = useState("dashboard");
  const [decisions, setDecisions] = useState([]);
  const [sel, setSel] = useState(null);

  useEffect(() => {
    setDecisions(storage.getAll());
  }, []);

  function saveDecision(form) {
    const id = `dec:${Date.now()}`;
    const d = { ...form, id, createdAt: new Date().toISOString() };
    storage.set(id, d);
    setDecisions(p => [d, ...p]);
  }

  function updateDecision(id, updates) {
    const d = decisions.find(x => x.id === id);
    if (!d) return;
    const updated = { ...d, ...updates };
    storage.set(id, updated);
    setDecisions(p => p.map(x => x.id === id ? updated : x));
  }

  return (
    <div style={S.r}>
      <style>{`@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}`}</style>
      <header style={S.hd}>
        <div style={S.logo}>
          <span style={S.logodot} />
          Decision Memory
        </div>
        <nav style={{ display: "flex", gap: "2px", marginLeft: "auto" }}>
          {[{ id: "dashboard", label: "Beranda" }, { id: "history", label: "Histori" }, { id: "pattern", label: "Pola" }].map(n => (
            <NavBtn key={n.id} label={n.label} active={view === n.id} onClick={() => setView(n.id)} />
          ))}
        </nav>
      </header>
      <main style={S.pg}>
        {view === "dashboard" && <Dashboard decisions={decisions} go={setView} pick={setSel} />}
        {view === "new" && <NewDecision onSave={saveDecision} onBack={() => setView("dashboard")} />}
        {view === "history" && <History decisions={decisions} go={setView} pick={setSel} />}
        {view === "detail" && sel && <Detail d={sel} go={setView} onCheckin={() => setView("checkin")} />}
        {view === "checkin" && sel && <Checkin d={sel} onSave={updateDecision} onBack={() => setView("dashboard")} />}
        {view === "pattern" && <PatternReport decisions={decisions} onBack={() => setView("dashboard")} />}
      </main>
      {(view === "dashboard" || view === "history") && (
        <button style={S.fab} onClick={() => setView("new")}>+</button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
